{% extends "base.html" %}
{% load static %}

{% block content %}

<section class="py-5 bg-light">

  <div class="container-fluid">

    <div class="text-center mb-4">
      <h2 class="fw-bold">Book Your Mixer Repair</h2>
      <p class="text-muted">Quick service. Trusted technicians. Fast response.</p>
    </div>

    <div class="row">
      <div class="col-12">

        <div class="card shadow border-0">
          <div class="card-body p-5">

            <form method="POST" action="/repair/">
            {% csrf_token %}

              <div class="row">

                <div class="col-md-6 mb-3">
                  <label class="form-label">Full Name</label>
                  <input type="text" class="form-control" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Mobile Number</label>
                  <input type="tel" class="form-control" name="mobile" placeholder="Enter your mobile number" required>
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Email Address</label>
                  <input type="email" class="form-control" name="email" placeholder="Enter your email">
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">City</label>
                  <input type="text" class="form-control" name="city" placeholder="Enter your city">
                </div>

                <div class="col-12 mb-3">
                  <label class="form-label">Problem Description</label>
                  <textarea class="form-control" name="description" rows="4" placeholder="Describe your issue"></textarea>
                </div>

                <div class="col-12 d-grid">
                  <button type="submit" class="btn btn-success btn-lg">
                    Book Repair Now
                  </button>
                </div>

                <br><br>

                {% if messages %}
                  {% for message in messages %}
                    <div class="alert alert-success alert-dismissible fade show" role="alert">
                      {{ message }}
                      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                  {% endfor %}
                {% endif %}

              </div>

            </form>

          </div>
        </div>

      </div>
    </div>

  </div>

</section>

{% endblock %}
