{% extends "base.html" %}
{% load static %}
{% block content %}


<section class="py-5 bg-light">
  <div class="container">

    <!-- Title -->
    <div class="text-center mb-5">
      <h2 class="fw-bold mb-3">Place Your Order</h2>
      <p class="text-muted fs-5">Complete your purchase securely</p>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card border-0 shadow-lg">
          <div class="card-body p-5">

            <form method="POST" action="?product_id={{ request.GET.product_id }}">
              {% csrf_token %}
              <input type="hidden" name="product_id" value="{{ request.GET.product_id }}">

              <div class="row g-4">

                <!-- Product Name -->
                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="text" name="product_name" class="form-control" value="{{ product_name }}" readonly>
                    <label><i class="fas fa-box me-2"></i>Product</label>
                  </div>
                </div>

                <!-- Price -->
                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="number" name="price" id="price" class="form-control" value="{{ price }}" readonly>
                    <label><i class="fas fa-rupee-sign me-2"></i>Price</label>
                  </div>
                </div>

                <!-- Quantity -->
                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="number" name="quantity" id="quantity" class="form-control" value="1" min="1">
                    <label><i class="fas fa-sort-numeric-up me-2"></i>Quantity</label>
                  </div>
                </div>

                <!-- Total -->
                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="number" name="total" id="total" class="form-control" readonly>
                    <label><i class="fas fa-calculator me-2"></i>Total Amount</label>
                  </div>
                </div>

                <hr class="my-4">

                <!-- Customer Name -->
                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="text" name="name" class="form-control" placeholder="Enter your full name" pattern="[A-Za-z ]+" required>
                    <label><i class="fas fa-user me-2"></i>Full Name</label>
                  </div>
                </div>

                <!-- Phone -->
                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="tel" name="phone" class="form-control" placeholder="Enter phone number" pattern="[0-9]{10}" maxlength="10" required>
                    <label><i class="fas fa-phone me-2"></i>Phone Number</label>
                  </div>
                </div>

                <!-- Address -->
                <div class="col-12">
                  <div class="form-floating">
                    <textarea name="address" class="form-control" style="height:120px;" placeholder="Enter your full address" required></textarea>
                    <label><i class="fas fa-map-marker-alt me-2"></i>Delivery Address</label>
                  </div>
                </div>

                <!-- Submit Button -->
                <div class="col-12 d-grid">
                  <button type="submit" class="btn btn-success btn-lg mb-2">
                    <i class="fas fa-check-circle me-2"></i>Confirm Order
                  </button>
                  <a href="https://wa.me/919921071945?text=Hello,%20I%20want%20to%20order%20the%20{{ product_name }}" class="btn btn-outline-success btn-lg">
                    <i class="fab fa-whatsapp"></i> Order via WhatsApp instead
                  </a>
                </div>

                <!-- Success Message -->
                {% if messages %}
                  {% for message in messages %}
                    <div class="alert alert-success alert-dismissible fade show mt-4" role="alert">
                      <i class="fas fa-check-circle me-2"></i>{{ message }}
                      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                  {% endfor %}
                {% endif %}

              </div>

            </form>

          </div>
        </div>

      </div>
    </div>

  </div>
</section>

<!-- JavaScript for Total Calculation -->
<script>
const priceInput = document.getElementById("price");
const quantityInput = document.getElementById("quantity");
const totalInput = document.getElementById("total");

function calculateTotal() {
  const price = parseFloat(priceInput.value) || 0;
  const quantity = parseInt(quantityInput.value) || 1;
  totalInput.value = price * quantity;
}

quantityInput.addEventListener("input", calculateTotal);
calculateTotal();
</script>

{% endblock %}
